name: validate-skills

on:
  pull_request:
    paths:
      - '*/SKILL.md'
      - '*/README.md'
      - '*/CHANGELOG.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill structure
        run: |
          failed=0
          for skill_dir in */; do
            # Skip non-skill directories
            [ -f "$skill_dir/SKILL.md" ] || continue
            skill=$(basename "$skill_dir")

            if [ ! -f "$skill_dir/README.md" ]; then
              echo "❌ $skill: missing README.md"
              failed=1
            fi

            if [ ! -f "$skill_dir/CHANGELOG.md" ]; then
              echo "❌ $skill: missing CHANGELOG.md"
              failed=1
            fi

            if ! grep -q "^name:" "$skill_dir/SKILL.md"; then
              echo "❌ $skill: SKILL.md missing 'name' in frontmatter"
              failed=1
            fi
            if ! grep -q "^description:" "$skill_dir/SKILL.md"; then
              echo "❌ $skill: SKILL.md missing 'description' in frontmatter"
              failed=1
            fi

            # Check skill is listed in root README.md table
            if ! grep -q "\`@${skill}\`" README.md; then
              echo "❌ $skill: not listed in root README.md skills table"
              failed=1
            fi

            if [ $failed -eq 0 ]; then
              echo "✅ $skill: OK"
            fi
          done

          exit $failed

      - name: Install clawhub
        if: always()
        run: npm install -g clawhub

      - name: Login to ClawHub
        if: always()
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser

      - name: Check slug availability
        if: always()
        run: |
          conflicts=0

          for skill_dir in */; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            skill=$(basename "$skill_dir")

            # Attempt a test publish to check slug ownership
            output=$(clawhub publish "$skill" \
              --slug "$skill" \
              --version "0.0.0-pr-check" \
              --changelog "Slug availability check" 2>&1) && ok=true || ok=false

            if [ "$ok" = "false" ]; then
              if echo "$output" | grep -qi "owner"; then
                echo "::error::$skill: slug '$skill' is already taken by another user on ClawHub"
                conflicts=1
              elif echo "$output" | grep -qi "version already exists"; then
                # 0.0.0-pr-check already published by a previous run — slug is ours, all good
                echo "✅ $skill: slug available (owned by us)"
              else
                echo "::warning::$skill: could not verify slug — $output"
              fi
            else
              echo "✅ $skill: slug available"
            fi
          done

          if [ "$conflicts" -gt 0 ]; then
            echo ""
            echo "::error::Some slugs are taken. Rename the skill folder or choose a different slug before merging."
            exit 1
          fi
