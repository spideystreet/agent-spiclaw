name: publish-clawhub

on:
  push:
    branches: [main]
    paths:
      - '*/SKILL.md'
      - '*/README.md'
      - '*/CHANGELOG.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install clawhub
        run: npm install -g clawhub

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser

      - name: Detect changed skills and publish
        id: publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: publish all skills
            changed_skills=$(ls -d */SKILL.md 2>/dev/null | cut -d/ -f1 | sort -u)
          else
            # Push trigger: publish only changed skills
            changed_skills=$(git diff --name-only HEAD~1 HEAD | grep '/SKILL.md\|/README.md\|/CHANGELOG.md' | cut -d/ -f1 | sort -u)
          fi

          if [ -z "$changed_skills" ]; then
            echo "No skill changes detected."
            exit 0
          fi

          published=""
          skipped=""
          for skill in $changed_skills; do
            if [ ! -d "$skill" ]; then
              echo "::warning::$skill: directory not found, skipping"
              continue
            fi

            # Read latest version and changelog entry from CHANGELOG.md
            version=""
            changelog=""
            if [ -f "$skill/CHANGELOG.md" ]; then
              version=$(awk '/^## /{gsub(/^## /,""); print; exit}' "$skill/CHANGELOG.md")
              changelog=$(awk '/^## /{found=1; next} found && NF{print; exit}' "$skill/CHANGELOG.md")
            fi
            version=${version:-"1.0.0"}
            changelog=${changelog:-"Update"}

            echo "Publishing $skill@$version — $changelog"
            publish_output=$(clawhub publish "$skill" \
              --slug "$skill" \
              --version "$version" \
              --changelog "$changelog" 2>&1) && publish_ok=true || publish_ok=false

            if [ "$publish_ok" = "true" ]; then
              published="$published $skill"
              echo "$publish_output"
            else
              echo "$publish_output"
              # Check if failure is a slug ownership conflict
              if echo "$publish_output" | grep -qi "owner"; then
                echo "::error::$skill: slug '$skill' is owned by another user"

                # Read skill description for Gemini context
                skill_desc=$(awk '/^description:/{gsub(/^description: */,""); print; exit}' "$skill/SKILL.md" 2>/dev/null || echo "$skill")

                # Ask Gemini Flash for alternative slug suggestions
                if [ -n "$GEMINI_API_KEY" ]; then
                  prompt="A ClawHub skill named \"$skill\" with description \"$skill_desc\" needs a new unique slug because \"$skill\" is already taken. Suggest exactly 3 alternative slugs. Rules: lowercase, hyphens only, concise, descriptive. Reply with ONLY 3 slugs, one per line, no numbering or extra text."

                  request_body=$(jq -n --arg p "$prompt" '{"contents":[{"parts":[{"text":$p}]}]}')

                  gemini_response=$(curl -s -w "\n%{http_code}" \
                    "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
                    -H "Content-Type: application/json" \
                    -d "$request_body") || true

                  http_code=$(echo "$gemini_response" | tail -1)
                  response_body=$(echo "$gemini_response" | sed '$d')

                  if [ "$http_code" = "200" ]; then
                    suggestions=$(echo "$response_body" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null)
                  else
                    echo "::warning::Gemini API returned HTTP $http_code"
                    error_msg=$(echo "$response_body" | jq -r '.error.message // empty' 2>/dev/null)
                    [ -n "$error_msg" ] && echo "::warning::Gemini error: $error_msg"
                    suggestions=""
                  fi

                  if [ -n "$suggestions" ]; then
                    echo ""
                    echo "::notice::Gemini suggests these alternative slugs for '$skill':"
                    echo "$suggestions" | while IFS= read -r line; do
                      [ -n "$line" ] && echo "::notice::  - $line"
                    done
                    echo ""
                    echo "To fix: rename the skill folder or add a 'slug' override, then re-publish."
                  else
                    echo "::warning::Could not get slug suggestions from Gemini"
                  fi
                else
                  echo "::warning::GEMINI_API_KEY not set — skipping slug suggestions"
                fi

                skipped="$skipped $skill"
              else
                echo "::error::$skill: publish failed"
                skipped="$skipped $skill"
              fi
            fi
          done

          echo "published=$published" >> $GITHUB_OUTPUT
          echo "skipped=$skipped" >> $GITHUB_OUTPUT

          # Fail the job if any skills were skipped
          if [ -n "$skipped" ]; then
            echo "::error::Some skills failed to publish:$skipped"
            exit 1
          fi

      - name: Notify Telegram
        if: steps.publish.outputs.published != ''
        run: |
          for skill in ${{ steps.publish.outputs.published }}; do
            changelog=$(awk '/^## /{found=1; next} found && NF{print; exit}' "$skill/CHANGELOG.md" 2>/dev/null || echo "Update")
            message="🦞 Skill publié : ${skill}%0A${changelog}"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=${message}"
          done
